<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice #{{BILL_NUMBER}}</title>
  <style>
    @page {
      size: A4;
      margin: 0 0 50px;
      @bottom-center { content: element(pageFooter); }
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color-adjust: exact;
    }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: #333;
      background: #fff;
      font-size: 12px;
      line-height: 1.4;
      padding: 12px;
    }

    .invoice-wrapper {
      max-width: 780px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .invoice-body {
      padding: 14px 28px 4px;
    }

    #pageFooter {
      position: running(pageFooter);
      text-align: center;
      padding: 6px 20px 4px;
      border-top: 2px solid #e4edf7;
      color: #227ed4;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header {
      background: #fff;
      color: #333;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 2px solid #227ed4;
    }

    .shop-logo {
      width: 70px;
      height: 70px;
      flex-shrink: 0;
    }

    .shop-logo img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .shop-logo-text {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    .shop-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-align: center;
    }

    .shop-name {
      font-family: 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif;
      font-size: 36px;
      font-weight: 700;
      color: #227ed4;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .shop-info {
      font-family: 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif;
      color: #666;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .info-bar {
      display: table;
      width: 100%;
      background: #f5f8fc;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 10px;
      border: 1px solid #e4edf7;
    }

    .info-bar-cell {
      display: table-cell;
      padding: 8px 16px;
      vertical-align: middle;
      border-right: 1px solid #e4edf7;
    }

    .info-bar-cell:last-child {
      border-right: none;
    }

    .info-bar-cell.right-align {
      text-align: right;
    }

    .info-label {
      color: #7c8db5;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .info-value {
      color: #227ed4;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .inv-badge {
      display: inline-block;
      background: #227ed4;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 4px;
      letter-spacing: 1px;
    }

    hr.divider {
      border: none;
      border-top: 2px solid #e4edf7;
      margin: 10px 0;
    }

    hr.divider-light {
      border: none;
      border-top: 1px solid #eceff1;
      margin: 12px 0;
    }

    table.items {
      width: 100%;
      border-collapse: collapse;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e4edf7;
    }

    table.items thead th {
      background: #227ed4 !important;
      color: #fff !important;
      padding: 6px 10px;
      font-family: 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border: none;
    }

    table.items tbody td {
      padding: 4px 10px;
      font-family: 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif;
      font-size: 11px;
      border: none;
      border-bottom: 1px solid #f0f1f5;
    }

    table.items tbody tr:last-child td {
      border-bottom: none;
    }

    table.items tr.even td {
      background: #f5f8fc !important;
    }

    table.items tbody td:first-child {
      color: #333;
      font-weight: 600;
      text-align: center;
    }

    table.items tbody td:nth-child(2) {
      text-align: left;
    }

    .totals {
      text-align: right;
    }

    table.totals-table {
      border-collapse: collapse;
      margin-left: auto;
      width: 22%;
      min-width: 130px;
      border: 1px solid #e4edf7;
      border-top: none;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
    }

    table.totals-table td {
      padding: 4px 10px;
      border: none;
      font-size: 11px;
    }

    table.totals-table tr:not(:last-child) td {
      border-bottom: 1px solid #f0f1f5;
    }

    table.totals-table .lbl {
      color: #7c8db5;
      text-align: left;
      font-weight: 500;
    }

    table.totals-table .val {
      text-align: right;
      font-weight: 700;
      color: #333;
    }

    table.totals-table tr.grand td {
      background: #227ed4 !important;
      color: #fff !important;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      letter-spacing: 0.5px;
    }

    .tc { text-align: center; }
    .tr { text-align: right; }
    .tl { text-align: left; }
    .b  { font-weight: bold; }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .invoice-wrapper {
        box-shadow: none;
        border-radius: 0;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="invoice-wrapper">

    <!-- Header (first page only) -->
    <div class="header">
      <div class="shop-logo">
        <div class="shop-logo-text">{{SHOP_LOGO}}</div>
      </div>
      <div class="shop-details">
        <div class="shop-name">{{SHOP_NAME}}</div>
        <div class="shop-info">{{SHOP_ADDRESS}} &nbsp;|&nbsp; {{SHOP_PHONE}}</div>
      </div>
    </div>

    <div class="invoice-body">

      <!-- Info Bar -->
      {{INVOICE_INFO_ROW}}

      <hr class="divider" />

      <!-- Items -->
      <table class="items">
        <thead>
          <tr>
            <th style="width: 4%" class="tc">#</th>
            <th style="width: 48%" class="tl">Item Description</th>
            <th style="width: 8%" class="tc">Qty</th>
            <th style="width: 16%" class="tr">Rate</th>
            <th style="width: 24%" class="tr">Amount</th>
          </tr>
        </thead>
        <tbody>
          {{ITEMS_ROWS}}
        </tbody>
      </table>

      <!-- Totals -->
      <div class="totals">
        <table class="totals-table">
          <tr>
            <td class="lbl">Subtotal</td>
            <td class="val">{{SUBTOTAL}} {{CURRENCY}}</td>
          </tr>
          <tr class="grand">
            <td class="lbl" style="color: #fff !important;">TOTAL</td>
            <td class="val">{{TOTAL}} {{CURRENCY}}</td>
          </tr>
        </table>
      </div>

    </div>

  </div>

  <!-- Footer (bottom of every page via running element) -->
  <div id="pageFooter">
    {{INVOICE_MESSAGE}}
    <div style="color: #b0bec5; font-size: 9px; font-weight: 400; letter-spacing: 0.3px;">This is a computer-generated invoice</div>
  </div>

</body>
</html>
